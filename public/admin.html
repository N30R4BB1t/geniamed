<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Prontuario Eletronico</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <strong>Area Administrativa</strong>
      <span>Cadastros do sistema</span>
    </div>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/prontuario.html">Prontuario</a>
      <a class="active" href="/admin.html">Admin</a>
    </nav>
  </header>

  <main class="admin-shell">
    <section id="loginPanel" class="panel admin-login">
      <h1>Acesso restrito</h1>
      <form id="loginForm" class="form-grid">
        <label>
          Usuario
          <input name="username" value="Admin" autocomplete="username" required>
        </label>
        <label>
          Senha
          <input name="password" type="password" value="Admin123" autocomplete="current-password" required>
        </label>
        <button>Entrar</button>
      </form>
      <p id="loginMessage" class="hint"></p>
    </section>

    <section id="adminPanel" class="admin-grid hidden">
      <aside class="panel admin-menu">
        <h2>Cadastros</h2>
        <button class="active-menu" type="button">Unidades</button>
        <button class="secondary" type="button" disabled>Capacidades</button>
        <button class="secondary" type="button" disabled>Usuarios</button>
        <button class="secondary" type="button" disabled>Protocolos</button>
        <button id="logoutButton" class="secondary" type="button">Sair</button>
      </aside>

      <section class="panel">
        <div class="section-title">
          <div>
            <h1>Unidades de atendimento</h1>
            <p class="hint">Cadastre hospitais, pronto atendimentos e clinicas.</p>
          </div>
          <button id="newUnitButton" type="button">Nova unidade</button>
        </div>

        <form id="unitForm" class="unit-form">
          <input type="hidden" name="id">

          <label>
            Nome
            <input name="name" required>
          </label>

          <label>
            Endereco
            <input name="address" required>
          </label>

          <label>
            Cidade
            <input name="city" required>
          </label>

          <label>
            UF
            <input name="state" maxlength="2" required>
          </label>

          <label>
            Telefone
            <input name="phone">
          </label>

          <label>
            Latitude
            <input name="latitude" type="number" step="0.0000001" required>
          </label>

          <label>
            Longitude
            <input name="longitude" type="number" step="0.0000001" required>
          </label>

          <label class="check-row">
            <input name="active" type="checkbox" checked>
            Unidade ativa
          </label>

          <div class="form-actions">
            <button>Salvar unidade</button>
            <button id="cancelEditButton" class="secondary" type="button">Cancelar</button>
          </div>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Cidade/UF</th>
                <th>Localizacao</th>
                <th>Status</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody id="unitsTable"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
