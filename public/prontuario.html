<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prontuario Eletronico</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <strong>Prontuario Eletronico</strong>
      <span>Consulta do paciente</span>
    </div>
    <nav>
      <a href="/">Dashboard</a>
      <a class="active" href="/prontuario.html">Prontuario</a>
      <a href="/admin.html">Admin</a>
    </nav>
  </header>

  <main class="record-shell">
    <section class="panel search-panel">
      <h1>Buscar paciente</h1>
      <form id="patientForm">
        <label for="patientId">ID do paciente</label>
        <div class="input-row">
          <input id="patientId" name="patientId" placeholder="UUID do paciente" required>
          <button>Buscar</button>
        </div>
      </form>
      <p class="hint">Exemplo: 11111111-1111-1111-1111-111111111111</p>
    </section>

    <section id="record" class="panel record-panel empty">
      <h2>Nenhum paciente selecionado</h2>
    </section>
  </main>

  <script src="/prontuario.js"></script>
</body>
</html>
